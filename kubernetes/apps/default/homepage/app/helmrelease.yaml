---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: homepage
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 2.5.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v0.8.9
            env:
              TZ: "${TIMEZONE}"
              HOMEPAGE_VAR_QBITTORRENT_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-secret
                    key: UI_USERNAME
              HOMEPAGE_VAR_QBITTORRENT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-secret
                    key: UI_PASSWORD
              HOMEPAGE_VAR_RADARR_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: radarr-secret
                    key: RADARR__API_KEY
              HOMEPAGE_VAR_SONARR_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: sonarr-secret
                    key: SONARR__API_KEY
              HOMEPAGE_VAR_PROWLARR_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: prowlarr-secret
                    key: PROWLARR__API_KEY
              HOMEPAGE_VAR_PLEX_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: plex-secret
                    key: PLEX_TOKEN
              HOMEPAGE_VAR_OVERSEERR_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: overseerr-secret
                    key: API_KEY
            envFrom:
              - secretRef:
                  name: homepage-secret
    service:
      main:
        ports:
          http:
            port: 3000
    ingress:
      main:
        enabled: true
        className: internal
        hosts:
          - host: &host home.${SECRET_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: main
                  port: http
        tls:
          - hosts:
              - *host
    persistence:
      config:
        enabled: true
        type: configMap
        name: homepage-config
        globalMounts:
          - subPath: bookmarks.yaml
            path: /app/config/bookmarks.yaml
          - subPath: docker.yaml
            path: /app/config/docker.yaml
          - subPath: kubernetes.yaml
            path: /app/config/kubernetes.yaml
          - subPath: services.yaml
            path: /app/config/services.yaml
          - subPath: settings.yaml
            path: /app/config/settings.yaml
          - subPath: widgets.yaml
            path: /app/config/widgets.yaml
    serviceAccount:
      create: true
